<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Día de la Mujer</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9acb,#ffd6e7);
overflow:hidden;
}

.login{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login h1{
color:#ff4da6;
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1a8c;
}

.flower{
position:absolute;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="login">
<h1>🌸 Feliz día de la mujer mi niña 🌸</h1>

<input type="text" id="usuario" placeholder="Tu nombre">
<input type="password" id="clave" placeholder="Contraseña">

<button onclick="entrar()">Entrar</button>
</div>

<script>

function entrar(){

let usuario=document.getElementById("usuario").value;
let clave=document.getElementById("clave").value;

let usuarioCorrecto="Scarleth";
let claveCorrecta="08/10";

if(usuario===usuarioCorrecto && clave===claveCorrecta){
window.location.href="mensaje.html";
}else{
alert("Nombre o contraseña incorrectos");
}

}

function crearFlor(){
const flor=document.createElement("div");
flor.classList.add("flower");
flor.innerText="🌸";

flor.style.left=Math.random()*100+"vw";
flor.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(flor);

setTimeout(()=>{
flor.remove();
},8000);
}

setInterval(crearFlor,300);

</script>

</body>
</html>
